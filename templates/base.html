<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Unbiased AI Platform{% endblock %}</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f7faf9;
            --surface-strong: #edf5f2;
            --text: #132019;
            --muted: #5a6b63;
            --teal: #1D9E75;
            --teal-soft: #d8f4ea;
            --red: #E24B4A;
            --red-soft: #fde9e9;
            --amber: #f2a93b;
            --amber-soft: #fff4de;
            --line: #dce7e2;
            --shadow: 0 10px 30px rgba(18, 32, 25, 0.07);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #e8f8f1 0%, #ffffff 35%) no-repeat;
            color: var(--text);
            font-family: "Avenir Next", "Nunito Sans", "Segoe UI", sans-serif;
            line-height: 1.5;
        }

        .nav {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--line);
        }

        .nav-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-decoration: none;
            color: var(--text);
        }

        .logo span {
            color: var(--teal);
        }

        .nav-links {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 10px;
            transition: background 0.2s ease;
        }

        .nav-links a:hover {
            background: var(--surface-strong);
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 20px 56px;
        }

        h1, h2, h3 {
            margin: 0;
            line-height: 1.2;
        }

        h1 {
            font-size: clamp(1.7rem, 3vw, 2.5rem);
        }

        h2 {
            font-size: clamp(1.2rem, 2.4vw, 1.6rem);
        }

        p {
            margin: 0;
            color: var(--muted);
        }

        .card {
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .grid {
            display: grid;
            gap: 18px;
        }

        .grid-3 {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .grid-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .btn {
            border: none;
            border-radius: 11px;
            padding: 10px 16px;
            font-weight: 700;
            cursor: pointer;
            background: var(--teal);
            color: #fff;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 8px 16px rgba(29, 158, 117, 0.24);
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .field {
            display: grid;
            gap: 7px;
        }

        label {
            font-weight: 700;
            font-size: 0.92rem;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px 11px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text);
        }

        input:focus,
        textarea:focus {
            outline: 2px solid rgba(29, 158, 117, 0.24);
            border-color: var(--teal);
        }

        .alert-error {
            border: 1px solid var(--red);
            background: var(--red-soft);
            color: #7c1f1f;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .badge-low {
            background: var(--teal-soft);
            color: #0f6e52;
        }

        .badge-medium {
            background: #eef2d1;
            color: #6d6a12;
        }

        .badge-high,
        .badge-critical {
            background: var(--red-soft);
            color: #8a2424;
        }

        .badge-data { background: #d7f3ff; color: #0c5f81; }
        .badge-feature { background: #ede5ff; color: #5e3d9a; }
        .badge-model { background: #ffe8cd; color: #8a4b08; }
        .badge-threshold { background: #d8f4ea; color: #11694f; }

        .metric-value {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text);
        }

        .metric-muted {
            color: var(--muted);
            font-weight: 600;
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--line);
            background: #fff;
        }

        th,
        td {
            text-align: left;
            padding: 10px 11px;
            border-bottom: 1px solid var(--line);
            font-size: 0.93rem;
            vertical-align: top;
        }

        th {
            background: var(--surface-strong);
            color: #21463a;
            font-weight: 700;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .status-pass {
            color: #0f6e52;
            font-weight: 700;
        }

        .status-fail {
            color: #8a2424;
            font-weight: 700;
        }

        .proxy-card {
            border: 1px solid #f2d0d0;
            background: #fff6f6;
            border-radius: 14px;
            padding: 14px;
            display: grid;
            gap: 8px;
        }

        .recommendation {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            background: #fff;
            display: grid;
            gap: 8px;
        }

        code {
            display: block;
            background: #0f1d17;
            color: #ddf7ed;
            border-radius: 8px;
            padding: 10px;
            font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
            font-size: 0.82rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .toggle-section {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fff;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .toggle-section + .toggle-section {
            margin-top: 14px;
        }

        .toggle-section input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .toggle-label {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--surface-strong);
            cursor: pointer;
            font-weight: 700;
            color: #24443a;
        }

        .toggle-label::after {
            content: "+";
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--teal);
        }

        .toggle-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.24s ease;
            padding: 0 16px;
        }

        .toggle-section input[type="checkbox"]:checked + .toggle-label::after {
            content: "-";
        }

        .toggle-section input[type="checkbox"]:checked ~ .toggle-content {
            max-height: 1600px;
            padding: 16px;
        }

        .delta-good {
            color: #0f6e52;
            font-weight: 700;
        }

        .delta-bad {
            color: #8a2424;
            font-weight: 700;
        }

        .narrative {
            white-space: pre-wrap;
            font-size: 0.95rem;
            color: #2d4038;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
        }

        footer {
            border-top: 1px solid var(--line);
            text-align: center;
            padding: 18px 20px 32px;
            color: #3f534b;
            font-size: 0.92rem;
        }

        @media (max-width: 980px) {
            .grid-3,
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        /* Modal Styles */
        #explanation-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 32, 25, 0.6);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: var(--bg);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(18, 32, 25, 0.25);
            max-width: 650px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--line);
            background: var(--surface-strong);
        }

        .modal-header h2 {
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(29, 158, 117, 0.1);
            border-radius: 8px;
        }

        .modal-body {
            padding: 20px;
        }

        .explanation-header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 12px;
        }

        .explanation-header h3 {
            margin: 0 0 6px 0;
        }

        .explanation-section {
            margin-bottom: 18px;
        }

        .explanation-section h4 {
            margin: 0 0 10px 0;
            color: #21463a;
            font-weight: 700;
            font-size: 0.98rem;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--line);
            font-size: 0.93rem;
        }

        .metric-label {
            font-weight: 600;
            color: var(--muted);
        }

        .metric-value {
            font-weight: 700;
            color: var(--teal);
        }

        .feature-contributions {
            display: grid;
            gap: 10px;
        }

        .feature-row {
            display: grid;
            grid-template-columns: 120px 1fr 70px;
            gap: 10px;
            align-items: center;
            font-size: 0.88rem;
        }

        .feature-name {
            font-weight: 600;
            word-break: break-word;
        }

        .feature-bar-container {
            background: var(--surface-strong);
            border-radius: 4px;
            height: 20px;
            overflow: hidden;
        }

        .feature-bar {
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .feature-bar.positive {
            background: rgba(29, 158, 117, 0.7);
        }

        .feature-bar.negative {
            background: rgba(226, 75, 74, 0.7);
        }

        .feature-value {
            text-align: right;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }

        .error-message {
            background: var(--red-soft);
            color: #8a2424;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--red);
        }

        /* Clickable Row Styles */
        tr[data-record] {
            transition: background-color 0.15s ease;
        }

        tr[data-record]:hover {
            background-color: var(--surface-strong) !important;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .modal-content {
                max-width: 95%;
            }

            .feature-row {
                grid-template-columns: 80px 1fr 50px;
            }
        }
    </style>
</head>
<body data-dataset-context="{{ dataset_context or '' }}">
    <nav class="nav">
        <div class="nav-inner">
            <a class="logo" href="/">Unbiased <span>AI</span></a>
            <div class="nav-links">
                <a href="/">Upload</a>
                <a href="/report">Report</a>
                <a href="/compare">Compare</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>Bias Prevention Platform</footer>

    <!-- Explanation Modal -->
    <div id="explanation-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Record Explanation</h2>
                <button class="modal-close" title="Close">&times;</button>
            </div>
            <div class="modal-body"></div>
        </div>
    </div>

    <!-- Explanation JavaScript -->
    <script src="/static/js/explanations.js"></script>
</body>
</html>
